dataset:
  name: ego_phase1_desk_mock
  version: 0.1.0
  scenario_family: desk_exploration
  scenario_card: configs/scenarios/desk_active_scan_mock.yaml
  frame_rate: 10
  resolution: [256, 256]
  trajectory_length: 24
  action_space: discrete_egocentric_v1
  render_profile: fast_rgbd_v1
  agent_embodiment: human_head_camera
  annotations:
    - rgb
    - depth
    - semantic
    - instance
    - pose
    - action

generation:
  backend: mock
  scene_seed_start: 10000
  episode_seed_start: 900000
  episodes_per_scene: 2
  policy_mix:
    scripted_active_scan: 0.6
    random_scan: 0.3
    target_search: 0.1

quality:
  min_mean_motion: 0.002
  min_visible_object_categories: 2
  max_blank_rgb_fraction: 0.05

objects:
  taxonomy:
    monitor: electronics
    keyboard: electronics
    mouse: electronics
    mug: container
    phone: electronics
    notebook: paper
    lamp: lighting
    book: paper
