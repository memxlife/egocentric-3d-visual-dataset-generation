  <script>
    const docs = [{"file": "README.md", "label": "Egocentric Visual Scanning Dataset Specification", "markdown": "# Egocentric Visual Scanning Dataset Specification\n\nThis specification defines a synthetic egocentric visual scanning dataset for learning\nmotion-conditioned visual prediction and persistent 3D semantic spatial structure.\n\nVersion 1 isolates a deliberately constrained problem: the world is static and only the camera\nmoves. This removes object dynamics, manipulation, contact physics, and task execution from the\nfirst dataset version. As a result, every visual change in a sequence should be explainable by the\ncamera's changing viewpoint over a persistent 3D indoor scene.\n\nThe dataset is organized around accepted static scenes and short egocentric camera-motion clips. A\nstatic scene defines the layout, objects, support relations, materials, lighting, and valid camera\nfree space. A clip starts from a meaningful object-aware viewpoint and follows a smooth physically\nvalid trajectory that produces locally continuous frames and globally meaningful spatial change.\n\nThe purpose of this specification is not only to describe what files are written. It defines the\ngeneration constraints, visual-content requirements, trajectory mechanics, acceptance metrics,\ncalibration procedure, and claim boundary needed to produce a useful research dataset.\n\n## Phase 1 Prototype And Version 1 Dataset\n\nThe project has two scopes that must not be confused.\n\n| Scope | Purpose | Success condition |\n|---|---|---|\n| Phase 1 prototype | Validate the end-to-end generation, validation, rejection, preview, and storage pipeline. | The remote pipeline can generate short clips, reject bad candidates, write the schema, and make failures visible in a preview. |\n| Version 1 dataset | Produce a calibrated multi-scenario dataset for learning motion-conditioned egocentric prediction and 3D semantic structure. | The dataset contains physically grounded static worlds and valid, visually meaningful, smooth, spatially transformative clips with controlled generalization splits. |\n\nPhase 1 may use a small number of desk or ProcTHOR scenes. Version 1 targets multiple scenario\nfamilies, many accepted static scenes, many object-aware starts per scene, multiple motion\nprimitives per start, RGB/depth/segmentation/pose/intrinsics/correspondence annotations, calibrated\nacceptance metrics, and held-out evaluation splits.\n\n## Document Map\n\nRead the specification documents in this order:\n\n1. [Objective And Claim Boundary](objective.md)  \n   Defines the research purpose, core learning target, input/supervision separation, and claim\n   boundary.\n\n2. [Dataset Units And Hierarchy](dataset_units_and_hierarchy.md)  \n   Defines the dataset hierarchy from scenario families to scenes, starts, clips, frames, and\n   annotations.\n\n3. [Static Scene Design](static_scene_design.md)  \n   Defines scenario grammar, layout templates, object categories, support rules, object states,\n   material distributions, clutter regimes, and rejected examples.\n\n4. [Visual Content Requirements](visual_content_requirements.md)  \n   Defines frame-level, clip-level, and dataset-level visual-content requirements.\n\n5. [Trajectory And Sequence Design](trajectory_sequence_design.md)  \n   Defines object-aware start sampling, free-space construction, motion primitives, smoothness\n   constraints, and spatial-change requirements.\n\n6. [Metrics And Acceptance](metrics_acceptance.md)  \n   Defines executable scene, frame, clip, and dataset metrics with inputs, formulas, thresholds,\n   debug artifacts, and rejection reason codes.\n\n7. [Dataset Schema](dataset_schema.md)  \n   Defines directory layout, coordinate conventions, depth encoding, segmentation IDs, metadata,\n   and seed/version policy.\n\n8. [Splits And Generalization](splits_and_generalization.md)  \n   Defines train/validation/test split policies and the generalization claims each split supports.\n\n9. [Generation Pipeline](generation_pipeline.md)  \n   Defines the abstract gated generation process from scenario sampling to post-write validation.\n\n10. [Pilot Calibration](pilot_calibration.md)  \n    Defines how thresholds are calibrated before scaling.\n\nImplementation status and machine-specific commands live outside the specification:\n\n- [Implementation Roadmap](../implementation/roadmap.md)\n- [Remote 5090 Runbook](../runbook/remote_5090.md)\n- [Smoke Tests](../runbook/smoke_tests.md)\n- [Preview Generation](../runbook/preview_generation.md)\n\n## Conceptual Hierarchy\n\n```text\ndataset purpose\n  -> scenario families\n    -> many accepted static scenes per family\n      -> many object-aware starting viewpoints per static scene\n        -> many short smooth video clips per starting viewpoint\n          -> frame-level RGB/depth/segmentation/pose/intrinsics/correspondence\n```\n\n## Version 1 Target\n\nThe first production target is:\n\n```text\n3,500 accepted static scenes\n  desk: 1,000\n  kitchen counter: 1,000\n  bookshelf/storage: 500\n  living room table/sofa area: 500\n  bathroom vanity: 500\n```\n\nEach accepted static scene should then generate many short egocentric clips. The initial target for\nmajor scenario families is:\n\n```text\n1,000 scenes\n  x 128 starting viewpoints per scene\n  x 4 clips per starting viewpoint\n  x 32 frames per clip\n  = 16,384,000 frames per major family\n```\n\nThese are target orders of magnitude, not frozen constants. They must be revised after pilot\ncalibration reports acceptance rates, rejection reasons, throughput, and visual quality.\n\n## Current Claim Boundary\n\nThis spec does not claim real-robot transfer yet. It claims that a useful Version 1 dataset must\nproduce static, physically grounded, semantically meaningful indoor worlds and short egocentric\ncamera-motion clips that are valid, visually meaningful, smooth frame-to-frame, and spatially\ntransformative across the sequence.\n"}, {"file": "objective.md", "label": "Objective", "markdown": "# Objective\n\n## Purpose\n\nThe dataset trains models that learn visual-spatial dynamics from egocentric camera motion. The\nmodel observes a visual stream from a moving camera and uses known camera motion to predict future\nvisual observations or infer persistent three-dimensional semantic structure.\n\nVersion 1 isolates one core learning problem: how a model learns persistent 3D semantic structure\nfrom egocentric visual changes caused purely by camera motion. By keeping the world static, the\ndataset removes confounding factors from object dynamics and contact physics. Therefore, when the\nvisual stream changes, the only valid explanation is the camera's changing viewpoint with respect\nto a persistent scene.\n\nThe first-stage problem is:\n\n```text\nstatic 3D indoor world + moving egocentric camera -> spatially grounded visual sequence\n```\n\nNo object manipulation, object motion, physical interaction, or task execution is required in\nVersion 1.\n\nThe central research claim is:\n\n```text\nGiven past egocentric observations and known camera motion,\na model should learn to predict future visual observations\nand infer stable 3D semantic structure in a static indoor environment.\n```\n\n## Generative Model\n\nEach static world is:\n\n```text\nz = (G, O, M, L)\n```\n\nwhere:\n\n- `G` is room geometry and layout;\n- `O` is object set, object geometry, and object pose;\n- `M` is material and texture assignment;\n- `L` is lighting.\n\nAt frame `t`, the camera pose is:\n\n```text\nT_t in SE(3)\n```\n\nThe rendered observation is:\n\n```text\nI_t = R(z, T_t)\n```\n\nThe world is static during one clip:\n\n```text\nz_t = z for all t\n```\n\nAll visual change should be caused by camera motion.\n\n## Learning Target\n\nThe main Version 1 training problem is:\n\n```text\n(I_0:k, delta_T_k:H-1) -> I_k+1:H\n```\n\nThat means the model receives past visual context and future spatial transformations, then predicts\nfuture visual frames.\n\nA richer spatial-learning target is:\n\n```text\nf(I_<=t, camera_poses, intrinsics) -> estimated 3D semantic scene representation\n```\n\nThe ground-truth world model is not model input. It is retained for supervision, filtering,\ndiagnosis, and evaluation.\n\n## Input And Supervision Separation\n\nModel input should stay close to sensory experience:\n\n- RGB;\n- optional depth;\n- camera pose or relative motion;\n- camera intrinsics.\n\nGround-truth supervision may include:\n\n- depth;\n- normals;\n- semantic segmentation;\n- instance segmentation;\n- pixel-to-3D correspondence;\n- visible object and surface identifiers;\n- scene and object metadata.\n\nThis separation keeps the learning problem meaningful while making the dataset auditable.\n\n## Four Dataset Requirements\n\nThe dataset fails if it fails any of the four top-level requirements:\n\n| Requirement | Meaning |\n|---|---|\n| generation speed | Accepted clips can be generated fast enough for repeated research loops. |\n| realism | Static scenes obey real-world geometry, scale, support, object-state, lighting, and navigability rules. |\n| per-scenario comprehensiveness | Clips cover required viewpoints, motions, objects, and visibility events inside each scenario. |\n| cross-scenario diversity | The full dataset covers scenario families, layouts, objects, appearances, states, and trajectory types. |\n\n## Claim Boundary\n\nVersion 1 is successful if it produces useful motion-conditioned visual transformations from static\nindoor worlds. It does not need manipulation or real-robot deployment evidence yet.\n\nThe dataset should not be used to claim that a model understands object dynamics, contact physics,\nrobot control, or task execution. Those claims require later dataset versions with moving objects,\nactions, and real or simulated interaction evidence.\n"}, {"file": "dataset_units_and_hierarchy.md", "label": "Dataset Units And Hierarchy", "markdown": "# Dataset Units And Hierarchy\n\n## Design Goal\n\nThe dataset must be organized so that a researcher can ask what varies at each level and what stays\nfixed. This prevents two common failures: treating many clips from one static scene as many\nindependent worlds, and treating many frames from one clip as independent images.\n\n## Unit Definitions\n\n| Unit | Definition | What varies inside it | What stays fixed |\n|---|---|---|---|\n| dataset | Complete collection used for training or evaluation. | Scenario families, scenes, trajectories, appearances, splits. | Dataset version and schema version. |\n| scenario family | Semantic environment type such as desk or kitchen counter. | Layout templates, object sets, materials, lighting. | High-level functional meaning. |\n| static scene | One persistent 3D world. | Probe viewpoints and generated clips. | Layout, objects, object states, materials, lighting. |\n| start viewpoint | One valid object-aware initial camera pose. | Motion primitives launched from the start. | Anchor object or surface and starting pose. |\n| clip | One short camera-motion sequence. | Frames over time. | Static scene, start, primitive parameters. |\n| frame | One rendered observation at one camera pose. | Annotation channels. | Timestamp and camera pose. |\n\nThe static scene is the main world unit. The clip is the main learning unit. The frame is not a\nstandalone training example unless the experiment explicitly ignores temporal structure.\n\n## Version 1 Hierarchy\n\n```text\nscenario_family\n  -> layout_template\n    -> accepted_static_scene\n      -> semantic_anchor\n        -> object_aware_start\n          -> motion_primitive_or_composition\n            -> accepted_clip\n              -> frame_annotations\n```\n\nThis hierarchy defines where diversity should be measured. Cross-scenario diversity is not the same\nas many random camera paths. Per-scenario comprehensiveness is not the same as many frames. A good\ndataset varies both world content and camera behavior while preserving physically and semantically\nvalid structure.\n\n## Phase 1 Prototype Unit\n\nPhase 1 should use the same hierarchy but at small scale:\n\n```text\n1-2 scenario families\n  5-10 procedural scenes\n    8-16 object-aware starts per scene\n      1-2 clips per start\n        32 frames per clip\n```\n\nThe Phase 1 success condition is not dataset size. It is whether each unit can be generated,\nvalidated, rejected with a reason, written to disk, and inspected in the preview viewer.\n\n## Version 1 Dataset Unit\n\nVersion 1 should scale only after the Phase 1 unit passes. A major scenario family target is:\n\n```text\n1,000 accepted scenes\n  x 128 starting viewpoints per scene\n  x 4 clips per starting viewpoint\n  x 32 frames per clip\n```\n\nThese numbers define the intended coverage density. The final production numbers should be based on\npilot acceptance rates, throughput, storage budget, and the diversity needed by held-out evaluation\nsplits.\n\n## Required Metadata At Each Level\n\nEvery level must have enough metadata to explain why it exists and how it was generated.\n\n| Level | Required metadata |\n|---|---|\n| scenario family | Required structures, allowed layout templates, object taxonomy, foreground classes, split policy. |\n| static scene | Scene seed, layout template, object list, support relations, materials, lighting, free-space summary, acceptance scores. |\n| start viewpoint | Anchor id, anchor category, camera pose, distance to anchor, anchor image area, start rejection checks. |\n| clip | Primitive type, primitive parameters, pose sequence, visual-content scores, continuity scores, global-change scores, rejection reason. |\n| frame | RGB/depth/segmentation paths, pose, intrinsics, visible objects, valid depth mask, timestamp. |\n\n## Failure Modes Prevented\n\nThis hierarchy prevents:\n\n- counting many correlated frames as many independent scenes;\n- training on clips whose static scene cannot be regenerated;\n- losing the anchor and primitive that explain why a clip was sampled;\n- mixing prototype-scale smoke runs with Version 1 dataset claims;\n- reporting dataset size without reporting scene, start, primitive, and split coverage.\n"}, {"file": "static_scene_design.md", "label": "Static Scene Design", "markdown": "# Static Scene Design\n\n## Role In The Dataset\n\nThe static scene layer defines the world that camera trajectories move through. A static scene is a\nsemantically coherent 3D indoor environment with objects, support surfaces, materials, lighting, and\nvalid camera free space.\n\nOne accepted static scene should generate many short egocentric video clips. The scene is therefore\nnot just a background. It is the persistent hidden state the model should infer from visual change.\n\n## Scene Representation\n\nOne static scene is:\n\n```text\nz = (layout, structures, support_surfaces, objects, states, materials, lighting, free_space)\n```\n\nThe scene must include:\n\n- room or local layout;\n- support surfaces;\n- large furniture or fixtures;\n- object instances;\n- object categories and instance ids;\n- object poses, scale, and support relations;\n- material, texture, and color assignments;\n- static object states;\n- lighting profile;\n- valid camera free-space region;\n- low-resolution probe views and static-scene acceptance scores.\n\n## Scenario Grammar\n\nEach scenario family must be defined by a grammar, not only an object list.\n\n| Field | Meaning |\n|---|---|\n| required structures | Furniture, fixtures, or room parts that make the scenario recognizable. |\n| required support surfaces | Surfaces where objects may validly rest or attach. |\n| required object categories | Categories that must be present for semantic completeness. |\n| optional object categories | Plausible categories that increase variety. |\n| distractor categories | Plausible extra objects that should not define the scenario. |\n| valid co-occurrences | Object combinations that make functional sense. |\n| invalid co-occurrences | Category or state combinations that should be rejected. |\n| support rules | Which objects may rest, hang, lean, attach, or be contained by which structures. |\n| state rules | Static object-state constraints that must be visually meaningful. |\n| layout templates | Allowed arrangements of structures and support surfaces. |\n| free-space templates | Camera-valid regions and expected viewing distances. |\n| lighting templates | Plausible light sources and intensity regimes. |\n| material distributions | Category-specific appearance distributions. |\n| occlusion requirements | Desired low, medium, and high occlusion regimes. |\n| probe-view criteria | Low-resolution tests that decide whether the scene is worth trajectory sampling. |\n\nThis grammar prevents plausible-looking category lists from becoming physically or semantically bad\nsynthetic scenes.\n\n## Scenario Families\n\nVersion 1 begins with five scenario families.\n\n| Scenario family | Initial accepted scene target | Why it matters |\n|---|---:|---|\n| computer desk | 1,000 | Small objects, occlusion, planar surfaces, displays, cables, text-like patterns. |\n| kitchen counter | 1,000 | Counter-level scanning, dishware, appliances, reflective materials, structured functional zones. |\n| bookshelf/storage shelf | 500 | Repeated structures, vertical organization, partial occlusion, small parallax. |\n| living room table/sofa area | 500 | Local objects connected to room-scale context. |\n| bathroom vanity | 500 | Mirrors, bottles, sink/counter surfaces, compact free space, specular surfaces. |\n\n## Scenario Cards\n\n### Computer Desk\n\nRequired structures:\n\n- desk or table surface;\n- nearby wall, chair, window, shelf, lamp, or room context.\n\nRequired object categories:\n\n- monitor or laptop;\n- input device such as keyboard, mouse, trackpad, or tablet.\n\nOptional and distractor categories:\n\n- mug, phone, notebook, pen, headphones, books, papers, cables, lamp, charger, small electronics,\n  boxes, plants, and personal objects.\n\nLayout templates:\n\n- single-monitor desk;\n- laptop-centered desk;\n- dual-monitor desk;\n- L-shaped desk;\n- desk against wall;\n- desk near window;\n- desk with side shelf;\n- cluttered student desk;\n- minimal office desk.\n\nAccepted examples:\n\n- laptop-centered desk with keyboard, mouse, notebook, mug, and partially visible chair;\n- dual-monitor desk with cables, lamp, papers, and shelf context;\n- sparse office desk where the required input device and display are visible from several probe\n  views.\n\nRejected examples:\n\n- empty desk with only one object;\n- monitor floating above the desk;\n- keyboard behind monitor and invisible in all probe views;\n- camera free space blocked by chair geometry;\n- all objects share the same color and texture;\n- a single object occupies more than 80 percent of every probe view.\n\n### Kitchen Counter\n\nRequired structures:\n\n- countertop surface;\n- at least one functional zone: sink, stove, food-preparation area, or appliance area;\n- storage such as cabinet, drawer, shelf, or fridge.\n\nRequired object categories:\n\n- dishware, appliance, utensil, bottle, jar, pan, pot, cutting board, towel, food item, or container.\n\nLayout templates:\n\n- straight counter;\n- L-shaped counter;\n- sink-centered counter;\n- stove-centered counter;\n- island counter;\n- small apartment kitchen;\n- dense appliance counter;\n- sparse counter.\n\nAccepted examples:\n\n- sink-centered counter with cups, soap bottle, towel, and cabinet context;\n- preparation zone with cutting board, knife, bowl, and nearby appliance;\n- stove-centered scene with pan, utensils, spice jars, and visible counter edges.\n\nRejected examples:\n\n- counter exists but no functional zone is visible;\n- dishware floats or is embedded in cabinetry;\n- sink appears without surrounding counter context;\n- objects are placed inside walls or appliances;\n- a mirror-like or reflective surface dominates the view without semantic content.\n\n### Bookshelf Or Storage Shelf\n\nRequired structures:\n\n- shelf geometry with multiple horizontal or vertical compartments.\n\nRequired object categories:\n\n- repeated books, boxes, bins, documents, or storage objects.\n\nOptional and distractor categories:\n\n- plants, photo frames, decorative objects, small devices, toys, and loose papers.\n\nAccepted examples:\n\n- shelf with varied book heights, colors, and thicknesses plus one plant and storage box;\n- storage shelf with bins, documents, and small devices at different depths;\n- dense shelf with some partial occlusion but multiple object categories visible.\n\nRejected examples:\n\n- repeated identical books only;\n- all books perfectly aligned with no visual variation;\n- no nearby distractor objects;\n- camera can only see a flat repetitive texture;\n- shelf geometry blocks all valid camera viewpoints.\n\n### Living Room Table Or Sofa Area\n\nRequired structures:\n\n- sofa, chair, coffee table, side table, TV stand, shelf, rug, or a combination of these.\n\nRequired object categories:\n\n- surface or contextual objects such as remote controls, cups, books, plants, toys, bags, pillows,\n  blankets, lamps, wall art, curtains, or small decor.\n\nAccepted examples:\n\n- coffee table with remote, books, mug, plant, sofa background, and rug context;\n- side table near sofa with lamp, phone, and visible wall/window context;\n- TV stand with small objects and partial room-scale context.\n\nRejected examples:\n\n- large empty room with no local inspection target;\n- sofa fills the view and no small object is visible;\n- table floats above rug or intersects sofa;\n- visual content is only blank wall or floor.\n\n### Bathroom Vanity\n\nRequired structures:\n\n- sink and counter;\n- mirror or reflective surface;\n- cabinet, shelf, towel rack, or drawer.\n\nRequired object categories:\n\n- bottles, toothbrushes, soap, towels, cosmetics, cups, tissue boxes, or containers.\n\nAccepted examples:\n\n- vanity with sink, mirror, toothbrush cup, soap bottle, towel, and cabinet context;\n- cluttered counter with cosmetics and bottles, where mirror does not dominate all probe views;\n- compact bathroom view with visible sink/counter geometry and valid camera free space.\n\nRejected examples:\n\n- mirror dominates all views;\n- sink and vanity are visible but no small objects are present;\n- bottles are placed inside the sink in implausible ways;\n- specular surfaces produce degenerate segmentation or depth artifacts;\n- toothbrush appears far from cup, holder, sink, or medicine cabinet.\n\n## Support And Placement Constraints\n\nSupport relations are part of the scene grammar. They should be explicit in metadata and checked\nbefore trajectory generation.\n\nExamples:\n\n- keyboard must be on a desk surface or tray;\n- mouse must be near keyboard or trackpad area;\n- monitor must be on desk, monitor arm, wall mount, or plausible stand;\n- mug must rest on a horizontal support surface unless it is in a physically plausible fallen state;\n- books may lie flat, stack, or stand against support;\n- cables may lie on desk, hang over edge, or connect devices;\n- toothbrush should appear near cup, holder, sink, medicine cabinet, or vanity area;\n- towel-hanging state requires hook, rack, cabinet handle, or other vertical support;\n- sink objects must appear near sink or vanity/counter surface.\n\nReject severe interpenetration, floating objects, impossible support relations, implausible scale,\nand object placements that violate the scenario grammar.\n\n## Static Object-State Constraints\n\nObject states must be visually meaningful, not metadata decorations.\n\n| State | Required visual constraint |\n|---|---|\n| laptop open | Visible hinge angle and distinct keyboard/screen planes. |\n| laptop closed | Single closed slab on valid support surface. |\n| monitor on | Static screen content or plausible emissive display. |\n| monitor off | Glossy or dark screen surface with no changing content. |\n| cabinet or drawer open | Visible opening, interior geometry, or dark interior region. |\n| fallen cup | Physically plausible support contact and no table intersection. |\n| towel hanging | Vertical support, hook, rack, or edge contact. |\n| mirror present | Planar reflective material bounded by frame or wall; probe views must not be dominated by mirror artifacts. |\n\nThe world remains static during a clip. State variation occurs across scenes, not during a sequence.\n\n## Material, Texture, And Color Distributions\n\nAppearance variation should be controlled by category.\n\n| Category | Plausible material distribution |\n|---|---|\n| desk surface | Wood, laminate, painted metal, glass. |\n| keyboard | Matte plastic, dark or light keycaps, slight roughness. |\n| monitor screen | Glossy black/off, emissive/on, reflective surface. |\n| mug | Ceramic, matte or glossy, colored or patterned. |\n| countertop | Stone, laminate, wood, stainless steel. |\n| bottle | Transparent plastic, translucent plastic, opaque ceramic, metal. |\n| mirror | High reflectance, planar, framed or wall-bounded. |\n| books | Paper pages, colored covers, text-like patterns. |\n| towel | Soft fabric, folded or hanging, non-metallic rough material. |\n\nAvoid arbitrary random color assignment that breaks semantic plausibility. Also avoid no variation,\nwhere all objects share the same material, color, and texture family.\n\n## Clutter And Occlusion\n\nEach scene samples a clutter level:\n\n```text\nsparse | medium | dense\n```\n\nInitial object count ranges:\n\n| Scenario | Sparse | Medium | Dense |\n|---|---:|---:|---:|\n| desk | 4-8 | 8-16 | 16-32 |\n| kitchen counter | 5-10 | 10-24 | 24-48 |\n| bookshelf/storage | 10-30 | 30-80 | 80-160 |\n| living room table/sofa | 5-12 | 12-28 | 28-56 |\n| bathroom vanity | 4-8 | 8-18 | 18-36 |\n\nObject count is only a proxy. Probe-view metrics must also measure visible object count,\nforeground pixel ratio, object area distribution, occlusion ratio, number of partially visible\nobjects, semantic entropy, instance entropy, small-object pixel mass, and dominant-object area.\n\n## Static Scene Acceptance\n\nA static scene is accepted only if it passes:\n\n```text\nC_scene(z) =\n  C_semantic_complete\n  and C_physical\n  and C_probe_visual_content\n  and C_free_space\n  and C_appearance_diverse\n```\n\nThese checks happen before expensive trajectory rendering. A scene with valid geometry but no useful\nprobe viewpoints is rejected because it cannot produce meaningful egocentric visual scanning data.\n"}, {"file": "visual_content_requirements.md", "label": "Visual Content Requirements", "markdown": "# Visual Content Requirements\n\n## Design Goal\n\nA physically valid camera path is not automatically useful. The camera can move smoothly through\nfree space and still see blank walls, empty floors, one giant object, repeated texture, or almost no\nnew spatial information. Visual-content requirements define what a frame, clip, and full dataset\nmust visually contain before the data is accepted.\n\n## Frame-Level Requirements\n\nEach accepted frame should contain enough meaningful content for motion-conditioned prediction.\n\n| Requirement | Why it matters | Initial test |\n|---|---|---|\n| foreground or support-surface content | Rejects views dominated by wall, ceiling, floor, or empty background. | `foreground_ratio >= threshold_for_scenario` |\n| visible object count | Ensures the frame contains semantic entities, not only one texture. | `visible_object_count >= min_objects` |\n| bounded dominant-object area | Rejects close-ups where one object removes scene context. | `dominant_object_area_ratio <= max_ratio` |\n| semantic diversity | Encourages object and surface variety in the image. | `semantic_entropy >= min_entropy` |\n| valid depth distribution | Rejects invalid depth, near-plane collision, or flat-depth degenerate views. | valid depth mass, depth range, depth histogram spread |\n| valid segmentation coverage | Ensures semantic/instance annotations cover visible content. | unknown or invalid segmentation ratio below threshold |\n| anchor visibility | Keeps object-aware starts and anchor-following primitives meaningful. | anchor visible in required frames and within area bounds |\n\nThe foreground class set is scenario-specific. For a desk, foreground includes desk surface,\nmonitor, keyboard, mouse, notebooks, mugs, electronics, cables, and nearby chair or shelf context.\nFor a living room, some room-scale context such as sofa, table, rug, wall art, or window can be\nvalid visual content.\n\n## Clip-Level Requirements\n\nAn accepted clip must be locally continuous but globally informative.\n\n| Requirement | Why it matters | Initial test |\n|---|---|---|\n| smooth adjacent change | Prevents teleportation, jitter, and abrupt visual jumps. | adjacent pose delta and adjacent visual delta within bounds |\n| nontrivial first-to-last change | Rejects copy-forward clips. | first-to-last pose and visual delta above threshold |\n| new object or surface evidence | Ensures motion reveals spatial structure. | visible object set or surface set changes over time |\n| depth distribution change | Encourages approach, retreat, parallax, or viewpoint change. | depth histogram delta above threshold |\n| parallax or viewpoint-induced transformation | Separates useful camera motion from pure image noise. | pose translation plus visible-background or surface-correspondence change |\n| no long redundant run | Prevents many near-duplicate frames. | maximum consecutive low-delta frames below limit |\n\nA clip is spatially transformative if it causes a measurable change in viewpoint, changes the\nvisible surface or object set, and reveals or reweights scene geometry in a way that cannot be\nsolved by copying the initial frame.\n\n## Dataset-Level Requirements\n\nAcross the dataset, visual content must vary in controlled ways:\n\n- scenario families;\n- layout templates;\n- object categories and counts;\n- object states;\n- materials, textures, and colors;\n- lighting profiles;\n- motion primitives;\n- anchor categories;\n- viewing distances and angles;\n- occlusion regimes;\n- reveal and revisit events.\n\nThe generator should use controlled distributions rather than arbitrary random colors or textures.\nThe goal is variation that preserves real-world plausibility while preventing overfitting to a small\nnumber of visual templates.\n\n## Occlusion Regimes\n\nOcclusion is useful because it forces the model to learn persistence and reappearance, but too much\nocclusion can make a frame uninformative. Each scenario family should sample three regimes:\n\n| Regime | Definition | Accepted example | Rejected example |\n|---|---|---|---|\n| low occlusion | Most required objects are fully visible. | A sparse desk where monitor, keyboard, and mug are all visible. | Empty desk with only one object. |\n| medium occlusion | Some objects are partially occluded but interpretable. | A mug partly behind a notebook, with the keyboard still visible. | Keyboard completely hidden behind the monitor in every probe view. |\n| high occlusion | Object clusters overlap strongly but remain semantically readable. | Dense kitchen counter with bottles and utensils partially blocking each other. | A single close object covers most of the frame and hides all context. |\n\n## Copy-Forward Rejection\n\nCopy-forward clips are sequences where predicting future frames from the first frame alone is too\neasy. Reject a clip when:\n\n```text\nfirst_to_last_visual_delta < min_global_visual_delta\nor visible_object_set_change < min_object_set_change\nor pose_displacement < min_pose_displacement\n```\n\nThe first implementation may approximate this with RGB difference, depth histogram difference,\nsemantic mask difference, and visible object set difference. Later versions should use surface IDs\nand pixel-to-3D correspondence.\n\n## Debug Artifacts\n\nEvery accepted or rejected pilot batch should produce:\n\n- RGB contact sheet;\n- depth contact sheet;\n- semantic and instance contact sheets;\n- foreground mask overlay;\n- largest-instance overlay;\n- anchor visibility timeline;\n- visible object count timeline;\n- adjacent visual-delta plot;\n- first-to-last change summary;\n- rejection reason table.\n"}, {"file": "trajectory_sequence_design.md", "label": "Trajectory And Sequence Design", "markdown": "# Trajectory And Sequence Design\n\n## Role In The Dataset\n\nEach accepted static scene should produce many short egocentric clips. A clip starts from a valid,\nmeaningful camera pose and follows a smooth physically plausible trajectory through free space.\n\nThe key tension is:\n\n```text\nadjacent frames should change smoothly\nbut the full clip should show meaningful spatial change\n```\n\nVersion 1 does not model full head, eye, hand, or body dynamics. The camera is an abstract\negocentric sensor. Motion is plausible if it is collision-free, smooth, bounded in velocity and\nacceleration, and produces viewpoint changes consistent with a person visually inspecting a nearby\nstatic scene.\n\n## Sequence Representation\n\nOne clip is:\n\n```text\ntau = [(I_0, T_wc_0), (I_1, T_wc_1), ..., (I_H, T_wc_H)]\n```\n\nwhere `T_wc_t` maps camera coordinates to world coordinates at frame `t`.\n\nThe relative camera motion is:\n\n```text\ndelta_T_t = inverse(T_wc_t) * T_wc_(t+1)\n```\n\nVersion 1 clips are short:\n\n```text\nH = 32-64 frames for pilot clips\n```\n\nLonger scans may be used later, but the first production unit is many short useful motion\ntransformations, not a few long random videos.\n\n## Object-Aware Starting Viewpoints\n\nStarting poses must be valid and meaningful. The generator should not sample uniformly over empty\nspace.\n\nProcess:\n\n1. Select a semantic anchor, such as a monitor, keyboard, sink, counter workspace, shelf section, or\n   object cluster.\n2. Sample a camera center near the anchor but in free space.\n3. Orient the camera roughly toward the anchor.\n4. Add angular perturbation so the anchor is not always centered.\n5. Render a low-resolution start probe.\n6. Reject the start if visual content is weak.\n\nThe selected anchor and start scores must be stored in sequence metadata.\n\n### Start Parameter Ranges\n\nInitial ranges:\n\n| Scenario | camera height | anchor distance | pitch | yaw perturbation | roll | anchor area |\n|---|---:|---:|---:|---:|---:|---:|\n| desk | 0.9-1.5 m | 0.35-1.2 m | -35 to +20 deg | -25 to +25 deg | -3 to +3 deg | 0.03-0.55 |\n| kitchen counter | 1.0-1.7 m | 0.4-1.5 m | -35 to +15 deg | -30 to +30 deg | -3 to +3 deg | 0.03-0.60 |\n| bookshelf/storage | 0.6-1.8 m | 0.4-1.5 m | -20 to +30 deg | -30 to +30 deg | -3 to +3 deg | 0.03-0.60 |\n| living room table/sofa | 0.7-1.7 m | 0.5-2.0 m | -30 to +20 deg | -35 to +35 deg | -3 to +3 deg | 0.02-0.55 |\n| bathroom vanity | 0.9-1.6 m | 0.35-1.2 m | -35 to +20 deg | -25 to +25 deg | -3 to +3 deg | 0.03-0.55 |\n\nThe pilot must calibrate these ranges. Too-close starts create single-object close-ups. Too-far\nstarts become room-level views with weak object detail.\n\n## Free-Space Construction\n\nThe camera has clearance radius `r`; it is not a zero-volume point.\n\nDefine:\n\n```text\nfree_space(r) = positions whose sphere of radius r does not intersect occupied geometry\n```\n\nThere are three distinct spaces:\n\n| Space | Definition | Failure it detects |\n|---|---|---|\n| geometric free space | Collision-free camera-center positions. | Camera center inside furniture, wall, object, or support surface. |\n| view-valid space | Collision-free positions from which useful visual content is visible. | Blank wall, empty floor, degenerate close-up. |\n| trajectory-valid space | Continuous paths whose swept volume is collision-free and visually useful. | Valid start with no valid smooth motion. |\n\nEvery pose must satisfy:\n\n```text\ncamera_center(T_wc_t) in free_space(r)\n```\n\nEvery swept transition must also be valid:\n\n```text\ncamera_center(interpolate(T_wc_t, T_wc_(t+1), s)) in free_space(r), for all s in [0, 1]\n```\n\nThe rendered depth map should also satisfy:\n\n```text\nminimum_valid_depth > d_min\n```\n\n## Motion Plausibility\n\nInitial motion ranges:\n\n| Quantity | Initial value |\n|---|---:|\n| clip length | 32-64 frames |\n| per-frame translation | 1-5 cm |\n| per-frame rotation | 1-3 degrees |\n| max linear acceleration | calibrated from pilot, reject obvious velocity jumps |\n| max angular acceleration | calibrated from pilot, reject abrupt look jumps |\n| minimum total displacement | 0.10-0.20 m for translational primitives |\n| minimum accumulated yaw/pitch | 8-15 degrees for scan primitives |\n\nThe trajectory should avoid:\n\n- teleportation;\n- jitter;\n- impossible acceleration;\n- abrupt orientation changes;\n- camera clipping through geometry;\n- near-plane collisions.\n\n## Motion Primitive Library\n\nDo not rely on purely random motion. Each primitive must define anchor type, start condition,\ntranslation path, rotation path, duration, parameters, validity constraints, expected visual effect,\nand failure modes.\n\n| Primitive | Purpose | Key parameters | Acceptance |\n|---|---|---|---|\n| lateral shift around anchor | Produce parallax while keeping anchor visible. | duration 16-48 frames; displacement 0.10-0.40 m; yaw compensation toward anchor. | Anchor visible in at least 70 percent of frames; total translation >= 0.12 m; neighboring object/background set changes. |\n| forward approach | Increase detail and depth change. | approach distance 0.10-0.50 m; max dominant object area 0.70. | Depth distribution changes; anchor does not consume whole frame; no near-plane collision. |\n| backward retreat | Move from detail to context. | retreat distance 0.10-0.60 m; orientation toward anchor. | More context or additional objects become visible. |\n| small orbit | Reveal side geometry around object or cluster. | arc 10-45 degrees; radius 0.35-1.5 m. | Visible surface/object set changes and anchor remains interpretable. |\n| look-down scan | Inspect support surface objects. | pitch change 8-25 degrees; small translation optional. | Surface and objects remain visible; no floor-only frames. |\n| look-up scan | Move from surface to vertical object/context. | pitch change 8-25 degrees. | Required anchor or neighboring context visible at start and end. |\n| left-right scan | Traverse multiple objects on a surface or shelf. | yaw change 10-40 degrees; optional lateral motion. | Visible object set changes without abrupt motion. |\n| peek-around-occluder | Create reveal events. | lateral/diagonal displacement 0.10-0.35 m. | At least one object or surface becomes newly visible. |\n| diagonal lean | Combine parallax and distance change. | diagonal displacement 0.10-0.40 m. | Smooth pose path and nontrivial visual change. |\n| combined translation and yaw | Natural inspection motion. | bounded translation plus 5-30 degrees yaw. | Passes continuity and global-change metrics. |\n\nReject any primitive if:\n\n- anchor fills more than 70 percent of most frames;\n- final frame is visually too similar to initial frame;\n- motion clips through table, wall, chair, fixture, or object;\n- visual content drops below frame-level thresholds for too many frames.\n\nPrimitive compositions may use:\n\n```text\noverview -> approach -> pan/tilt -> lateral shift -> orbit -> retreat -> revisit\n```\n\nCompositions must still pass per-frame, adjacent-frame, and full-clip metrics.\n\n## Sequence-Level Spatial Change\n\nA good clip should not merely shift pixels. It should reveal new spatial information.\n\nMeasure meaningful spatial change with:\n\n- pose displacement;\n- rotation displacement;\n- RGB or perceptual image change;\n- depth distribution change;\n- semantic mask change;\n- instance mask change;\n- newly visible object pixels;\n- newly visible surface pixels;\n- change in visible object set;\n- occlusion reveal events;\n- parallax magnitude.\n\nThe first implementation may approximate these with RGB frame difference, depth histogram\ndifference, semantic mask difference, and visible object set difference. Later versions should use\nsurface IDs and pixel-to-3D correspondence.\n\n## Sequence Acceptance Function\n\nA sequence is accepted only if:\n\n```text\nA(tau) =\n  C_occ\n  and C_phys\n  and C_frame_content\n  and C_anchor\n  and C_local_continuity\n  and C_global_change\n```\n\nwhere:\n\n- `C_occ` checks occupancy, free-space, and swept-path validity;\n- `C_phys` checks plausible camera motion;\n- `C_frame_content` checks foreground, object count, dominant-object balance, semantic diversity,\n  depth validity, and segmentation validity;\n- `C_anchor` checks anchor visibility and anchor area bounds;\n- `C_local_continuity` checks adjacent pose and visual deltas;\n- `C_global_change` checks sequence-level spatial and visual transformation.\n"}, {"file": "metrics_acceptance.md", "label": "Metrics And Acceptance", "markdown": "# Metrics And Acceptance\n\n## Top-Level Dataset Metrics\n\nThe dataset is judged by four top-level metrics:\n\n| Metric | What it measures | Failure if weak |\n|---|---|---|\n| generation speed | Accepted frames per second and stage timing. | Research loops become too slow to iterate. |\n| realism | Physical, geometric, semantic, and visual plausibility. | Models learn artifacts from invalid worlds. |\n| per-scenario comprehensiveness | Required content, viewpoints, motions, objects, and visibility events inside each scenario. | A scenario is present by name but not actually covered. |\n| cross-scenario diversity | Scenario families, layouts, objects, appearances, states, and trajectory types. | Dataset collapses into repeated templates. |\n\nAcceptance metrics must be executable. Each metric should define name, purpose, inputs, formula,\nvalid range, default threshold, scenario override, failure mode, debug visualization, and rejection\nreason code.\n\n## Static Scene Acceptance\n\nA static scene must pass:\n\n```text\nC_scene(z) =\n  C_semantic_complete\n  and C_physical\n  and C_probe_visual_content\n  and C_free_space\n  and C_appearance_diverse\n```\n\n| Metric | Purpose | Inputs | Formula or test | Initial threshold | Reject reason |\n|---|---|---|---|---|---|\n| `semantic_completeness` | Ensure required scenario grammar is present. | Object metadata, scenario card. | Required structures and categories are present. | all required items present | `missing_required_content` |\n| `support_validity` | Reject floating, embedded, or nonsensical objects. | Object poses, support surfaces, collision checks. | All required support relations valid and interpenetration below tolerance. | true | `invalid_support_relation` |\n| `probe_foreground_ratio` | Reject scenes with no useful viewpoints. | Probe semantic masks. | Median foreground ratio over probe views. | scenario threshold | `low_probe_foreground` |\n| `probe_visible_object_count` | Ensure probe views show meaningful entities. | Probe instance masks/object ids. | Median visible object count. | >= 2 or 3 | `low_probe_object_count` |\n| `free_space_volume` | Ensure camera can move. | Occupancy/free-space field. | Valid camera-center samples or connected volume. | scenario threshold | `insufficient_free_space` |\n| `appearance_entropy` | Avoid one-note materials/colors. | Material and color metadata. | Category/material/color entropy or unique bins. | pilot calibrated | `low_appearance_diversity` |\n\n## Frame Metric Dictionary\n\n### `foreground_ratio`\n\nPurpose: reject frames dominated by empty background such as wall, ceiling, or floor.\n\nInputs: semantic segmentation map and scenario foreground class set.\n\nFormula:\n\n```text\nforeground_ratio = foreground_pixels / valid_pixels\n```\n\nDefault threshold: `>= 0.40`.\n\nScenario overrides: bookshelf may require `>= 0.55`; living room may allow `>= 0.30` because room\ncontext can be meaningful.\n\nDebug visualization: foreground mask over RGB frame.\n\nReject reason: `low_foreground_ratio`.\n\n### `visible_object_count`\n\nPurpose: reject frames with too few semantic entities.\n\nInputs: instance segmentation map and visible object id list.\n\nFormula:\n\n```text\nvisible_object_count = count(objects with pixel_area >= min_object_pixels)\n```\n\nDefault threshold: `>= 2` for sparse scenes, `>= 3` for medium/dense scenes.\n\nDebug visualization: instance overlay with object ids.\n\nReject reason: `low_visible_object_count`.\n\n### `dominant_object_area_ratio`\n\nPurpose: reject frames where one object occupies too much of the image and removes scene context.\n\nInputs: instance segmentation map.\n\nFormula:\n\n```text\ndominant_object_area_ratio = max_instance_pixel_count / valid_pixels\n```\n\nDefault threshold: `<= 0.70`.\n\nDebug visualization: highlight largest instance and print area ratio.\n\nReject reason: `dominant_object_too_large`.\n\n### `semantic_entropy`\n\nPurpose: reject visually poor frames with too little semantic variety.\n\nInputs: semantic segmentation map.\n\nFormula:\n\n```text\nsemantic_entropy = -sum_c p(c) * log(p(c))\n```\n\nDefault threshold: pilot calibrated per scenario. Use only valid pixels and ignore unknown labels.\n\nDebug visualization: semantic mask plus class histogram.\n\nReject reason: `low_semantic_entropy`.\n\n### `anchor_visibility`\n\nPurpose: ensure object-aware starts and anchor-following primitives remain meaningful.\n\nInputs: anchor object id, instance segmentation map, visible object id list.\n\nFormula:\n\n```text\nanchor_area_ratio = anchor_pixels / valid_pixels\nanchor_visible = min_anchor_area <= anchor_area_ratio <= max_anchor_area\n```\n\nDefault threshold: anchor visible in at least `70%` of frames for anchor-maintaining primitives.\n\nDebug visualization: anchor mask overlay and timeline.\n\nReject reason: `anchor_not_visible` or `anchor_area_out_of_bounds`.\n\n## Clip Metric Dictionary\n\n### `visual_delta`\n\nPurpose: measure whether adjacent frames are smooth and whether the full clip changes enough to\navoid copy-forward solutions.\n\nComposite definition:\n\n```text\nvisual_delta = w_rgb * delta_rgb\n             + w_depth * delta_depth\n             + w_sem * delta_semantic\n             + w_inst * delta_instance\n             + w_surface * delta_surface\n```\n\nInitial implementation:\n\n```text\nvisual_delta_approx = w_rgb * mean_abs_rgb_difference\n                    + w_depth * depth_histogram_distance\n                    + w_sem * (1 - semantic_mask_iou)\n                    + w_obj * visible_object_set_distance\n```\n\nLater versions should replace approximations with surface-level change metrics using surface ids\nand pixel-to-3D correspondence.\n\nDebug visualization: adjacent visual-delta timeline and first-to-last comparison.\n\nReject reasons: `visual_delta_too_low`, `visual_delta_too_high`, `copy_forward_clip`.\n\n### `pose_delta`\n\nPurpose: ensure camera motion is smooth locally and significant globally.\n\nInputs: camera poses `T_wc_t`.\n\nFormula:\n\n```text\ntranslation_delta_t = norm(position_t+1 - position_t)\nrotation_delta_t = angle(relative_rotation_t)\n```\n\nInitial local bounds: translation `1-5 cm` per frame; rotation `1-3 degrees` per frame.\n\nInitial global bounds: total displacement `>= 0.10-0.20 m` for translational primitives or\naccumulated yaw/pitch `>= 8-15 degrees` for scan primitives.\n\nReject reasons: `pose_jump`, `pose_change_too_small`, `pose_acceleration_too_high`.\n\n### `new_visibility_evidence`\n\nPurpose: verify that the clip reveals new object or surface evidence.\n\nInputs: visible object ids, visible surface ids when available, segmentation maps.\n\nFormula:\n\n```text\nnew_object_ratio = pixels or ids visible after t=0 but not visible at t=0\nnew_surface_ratio = surface pixels visible after t=0 but not visible at t=0\n```\n\nVersion 0 approximation: visible object set change and semantic mask change.\n\nVersion 1 requirement: object instance coverage and surface coverage.\n\nReject reason: `no_new_visibility_evidence`.\n\n## Coverage Metric Versions\n\nCoverage requirements are versioned so the implementation can improve without pretending early\nproxies are final.\n\n| Version | Required coverage evidence |\n|---|---|\n| V0 approximation | Visible object timelines, semantic entropy, pose coverage, first-to-last image difference. |\n| V1 required | Object instance coverage, visible surface coverage, viewing distance distribution, occlusion reveal count. |\n| V2 preferred | Surface point revisit count, view-angle distribution per surface, pixel-to-3D correspondence-based coverage. |\n\n## Sequence Acceptance\n\nA video sequence must pass:\n\n```text\nA(tau) =\n  C_occ\n  and C_phys\n  and C_frame_content\n  and C_anchor\n  and C_local_continuity\n  and C_global_change\n  and C_new_evidence\n```\n\nEach rejected sequence must store one or more rejection reason codes. The preview viewer should\nshow the failing metric values next to RGB/depth/segmentation contact sheets so an engineer can see\nwhether the metric matches the visual failure.\n"}, {"file": "dataset_schema.md", "label": "Dataset Schema", "markdown": "# Dataset Schema\n\n## Dataset Layout\n\nThe dataset unit is a sequence episode generated from one accepted static scene.\n\nRecommended conceptual layout:\n\n```text\ndataset_root/\n  metadata/\n    dataset_manifest.jsonl\n    scene_manifest.jsonl\n    episode_manifest.jsonl\n    object_taxonomy.json\n    action_space.json\n    schema_version.json\n  scenes/\n    scene_000001/\n      scene.json\n      world.json\n      object_metadata.json\n      validation.json\n      probe_views/\n  episodes/\n    episode_000000001/\n      episode.json\n      trajectory.parquet\n      camera_intrinsics.json\n      quality_metrics.json\n      frames/\n        000000.rgb.webp\n        000000.depth.png\n        000000.semantic.png\n        000000.instance.png\n        000000.normal.exr\n        000000.point3d.exr\n        000000.visible_surface_ids.npy\n        000000.visible_object_ids.json\n  splits/\n    train.txt\n    val_seen_category.txt\n    test_scene_held_out.txt\n    test_object_category_held_out.txt\n    test_object_instance_held_out.txt\n    test_layout_held_out.txt\n    test_trajectory_held_out.txt\n    test_material_held_out.txt\n    test_cross_scenario.txt\n```\n\nThe exact file formats may change for storage efficiency, but the information must be preserved.\n\n## Coordinate Conventions\n\nAll position units are meters. The canonical pose is:\n\n```text\nT_wc: camera-to-world transform\n```\n\n`T_wc` maps points from camera coordinates to world coordinates. If a backend natively reports\nworld-to-camera or a different handedness, the writer must convert or explicitly record the backend\nconvention in metadata.\n\nCanonical pose should store:\n\n- metric position in world coordinates;\n- quaternion orientation as `xyzw`;\n- optional yaw/pitch/roll for debugging;\n- frame index and timestamp;\n- backend pose fields for traceability when useful.\n\nExample:\n\n```json\n{\n  \"frame_id\": 0,\n  \"timestamp\": 0.0,\n  \"T_convention\": \"T_wc_camera_to_world\",\n  \"position_m\": [0.0, 1.2, 2.4],\n  \"orientation_quaternion_xyzw\": [0.0, 0.0, 0.0, 1.0],\n  \"yaw_pitch_roll_degrees_debug\": [0.0, 0.0, 0.0],\n  \"fov_degrees\": 60.0\n}\n```\n\nThe camera coordinate frame must be declared in `schema_version.json`. If the renderer uses a\ndifferent axis convention, the dataset must state whether camera coordinates use `+x` right, `+y`\nup or down, and `+z` forward or backward.\n\n## Depth Encoding\n\nDepth must be unambiguous.\n\nEach dataset version must declare:\n\n- depth units, normally meters;\n- file format and dtype;\n- near and far clipping planes;\n- invalid depth value;\n- whether depth is metric z-depth or ray distance;\n- whether depth is in camera coordinates or converted from renderer output.\n\nRecommended Version 1 fields:\n\n```json\n{\n  \"depth_units\": \"meters\",\n  \"depth_type\": \"metric_z_depth\",\n  \"invalid_depth_value\": 0,\n  \"near_clip_m\": 0.05,\n  \"far_clip_m\": 20.0\n}\n```\n\n## Camera Intrinsics\n\nEvery sequence must store camera intrinsics:\n\n```json\n{\n  \"width\": 768,\n  \"height\": 768,\n  \"fx\": 665.1,\n  \"fy\": 665.1,\n  \"cx\": 384.0,\n  \"cy\": 384.0,\n  \"fov_degrees\": 60.0,\n  \"near_clip_m\": 0.05,\n  \"far_clip_m\": 20.0\n}\n```\n\nThe intrinsic matrix is:\n\n```text\nK = [[fx, 0, cx],\n     [0, fy, cy],\n     [0, 0, 1]]\n```\n\n## Segmentation And Object ID Stability\n\nSemantic classes must come from `metadata/object_taxonomy.json`. Instance IDs must be stable within\none static scene.\n\nRequired guarantees:\n\n- semantic class ids are stable across the dataset version;\n- object instance ids are stable across frames in a sequence;\n- object instance ids are stable across episodes generated from the same static scene;\n- regenerated scenes with the same scene seed should produce the same object ids when the backend\n  supports deterministic generation;\n- visible object ids mean object instances with at least `min_object_pixels` visible pixels unless\n  otherwise stated.\n\nThe schema should distinguish:\n\n```text\nsemantic_class_id\nscene_object_id\nepisode_visible_object_id\nbackend_object_id\n```\n\n## Minimal Frame Fields\n\nVersion 1 mandatory frame fields:\n\n- RGB;\n- depth;\n- camera pose;\n- camera intrinsics;\n- frame index or timestamp;\n- semantic segmentation;\n- instance segmentation;\n- visible object identifiers.\n\nPreferred full frame fields:\n\n- RGB;\n- depth;\n- surface normals;\n- semantic segmentation;\n- instance segmentation;\n- pixel-to-3D correspondence map;\n- visible surface ids;\n- visible object ids;\n- optional optical flow to adjacent frames.\n\n## Static Scene Metadata\n\nScene metadata must include:\n\n- scene id;\n- scenario family;\n- layout template;\n- clutter level;\n- room bounds;\n- support surfaces;\n- free-space summary;\n- lighting profile;\n- accepted/rejected state;\n- scene validation scores;\n- rejection reason codes when rejected.\n\nObject metadata must include:\n\n- object id;\n- category;\n- mesh id;\n- shape family;\n- position;\n- orientation;\n- scale;\n- support relation;\n- material;\n- base color;\n- texture id;\n- roughness;\n- metallic;\n- static state.\n\n## Sequence Metadata\n\nEach episode must store:\n\n- scenario id;\n- sequence id;\n- static scene id;\n- selected semantic anchor;\n- object-aware start parameters;\n- camera poses;\n- relative motions;\n- camera intrinsics;\n- action or primitive sequence;\n- primitive parameters;\n- quality scores;\n- acceptance/rejection reasons;\n- paths to frame annotations.\n\nThe core model input is:\n\n```text\n(I_0:k, delta_T_k:H-1)\n```\n\nThe target is:\n\n```text\nI_k+1:H\n```\n\n## Seed Semantics\n\nEvery generated object must be reproducible from explicit seeds:\n\n| Seed | Controls |\n|---|---|\n| dataset seed | High-level split and batch sampling. |\n| scenario seed | Scenario family and layout-template sampling. |\n| scene seed | Static scene content, object placement, materials, lighting. |\n| episode seed | Anchor, start pose, primitive, and trajectory parameters. |\n| render seed | Any stochastic renderer effects if enabled. |\n\nIf a backend cannot guarantee exact regeneration, the dataset must record backend version, asset\nversion, and enough metadata to explain the difference.\n\n## Schema Versioning\n\nEach dataset root must include `metadata/schema_version.json` with:\n\n- schema version;\n- generator git commit;\n- backend name and version;\n- asset source and version;\n- coordinate convention;\n- depth convention;\n- taxonomy version;\n- split policy version;\n- metric threshold version.\n"}, {"file": "splits_and_generalization.md", "label": "Splits And Generalization", "markdown": "# Splits And Generalization\n\n## Design Goal\n\nThe dataset should support controlled generalization claims. A random frame split is not enough\nbecause frames from the same clip, starts from the same scene, and scenes from the same layout\ntemplate are strongly correlated.\n\n## Split Files\n\nVersion 1 should provide:\n\n```text\nsplits/\n  train.txt\n  val_seen_category.txt\n  test_scene_held_out.txt\n  test_object_category_held_out.txt\n  test_object_instance_held_out.txt\n  test_layout_held_out.txt\n  test_trajectory_held_out.txt\n  test_material_held_out.txt\n  test_cross_scenario.txt\n```\n\nEach line should identify an episode id unless the split explicitly operates at scene level. The\nsplit manifest must state whether it lists scenes, episodes, or both.\n\n## Split Policies\n\n| Split | Held out | Claim it tests |\n|---|---|---|\n| `val_seen_category` | Episodes from seen scenes/categories but unseen seeds. | Basic interpolation and training stability. |\n| `test_scene_held_out` | Entire static scenes. | Generalization to new layouts and object arrangements within known scenario families. |\n| `test_object_category_held_out` | Selected object categories. | Ability to handle unseen semantic categories when possible. |\n| `test_object_instance_held_out` | Specific meshes/assets. | Generalization beyond memorized object geometry. |\n| `test_layout_held_out` | Layout templates. | Generalization to new spatial arrangements. |\n| `test_trajectory_held_out` | Motion primitives or primitive compositions. | Generalization to new camera motion patterns. |\n| `test_material_held_out` | Material or texture families. | Appearance generalization. |\n| `test_cross_scenario` | Entire scenario family when feasible. | Transfer across functional scene types. |\n\n## Leakage Rules\n\nThe split builder must prevent:\n\n- frames from the same clip appearing in both train and test;\n- clips from the same start viewpoint crossing train/test unless explicitly testing trajectory\n  variation from the same start;\n- episodes from the same static scene crossing a scene-held-out split;\n- object instances or meshes crossing an instance-held-out split;\n- layout templates crossing a layout-held-out split.\n\n## Metadata Requirements\n\nEach split must record:\n\n- split name;\n- split version;\n- construction date;\n- generator commit;\n- dataset version;\n- selection rules;\n- excluded scene ids;\n- excluded object categories or instances;\n- excluded layout templates;\n- excluded trajectory primitives;\n- counts by scenario family, scene, primitive, and anchor category.\n\n## Failure Modes Prevented\n\nThe split policy prevents overly optimistic evaluation caused by correlated frames, repeated\nscenes, repeated object meshes, repeated layouts, or repeated trajectory primitives. It also makes\nclear which generalization claim each test set can and cannot support.\n"}, {"file": "generation_pipeline.md", "label": "Generation Pipeline", "markdown": "# Generation Pipeline\n\n## Overview\n\nGeneration is a gated process. The system should reject bad static scenes before trajectory\nsampling, reject bad candidate trajectories before final-resolution rendering, and run post-write\nvalidation after outputs are stored.\n\nThe pipeline has three validation layers:\n\n| Layer | When it runs | What it prevents |\n|---|---|---|\n| scene validation | Before trajectory sampling. | Bad worlds, missing required content, invalid support, no useful viewpoints. |\n| candidate trajectory validation | Before final rendering. | Collision, weak visual content, jitter, copy-forward clips. |\n| post-render dataset validation | After final outputs are written. | Broken files, missing metadata, schema violations, corrupt annotations. |\n\n## End-To-End Pipeline\n\n1. Sample scenario family.\n2. Sample layout template.\n3. Instantiate required structures and support surfaces.\n4. Place required objects under support and co-occurrence constraints.\n5. Add optional and distractor objects.\n6. Assign material, texture, color, state, and lighting.\n7. Build occupancy and free-space fields.\n8. Render low-resolution probe views.\n9. Apply static scene acceptance.\n10. Select semantic anchors.\n11. Sample object-aware starts.\n12. Generate candidate motion primitives.\n13. Validate free-space poses and swept path.\n14. Render low-resolution preview.\n15. Compute visual-content, continuity, and global-change metrics.\n16. Accept or reject candidate sequence.\n17. Final-render accepted sequence.\n18. Write frames, annotations, pose, intrinsics, metadata, and quality scores.\n19. Run post-write integrity validation.\n20. Add accepted episode to manifests and preview dashboard.\n\n## Two-Stage Rendering\n\nUse cheap validation renders before final rendering:\n\n```text\ncandidate scene/trajectory\n  -> low-resolution validation render\n  -> acceptance scores\n  -> final-resolution render only if accepted\n```\n\nThis prevents final rendering from being dominated by invalid, empty, redundant, or physically\nimpossible clips.\n\n## Rejection Metadata\n\nEvery rejected candidate should keep enough information to debug the rejection:\n\n- static scene id;\n- scenario family and layout template;\n- anchor id and category;\n- start parameters;\n- primitive type and parameters;\n- failed metric names;\n- rejection reason codes;\n- probe or preview frame paths when available.\n\nRejected examples are not training data, but they are critical calibration evidence.\n\n## Scale Ladder\n\nUse this ladder:\n\n```text\nschema smoke: 3-10 episodes\nreal simulator smoke: 1-5 episodes\nmicro scene/trajectory pilot: 100-1,000 clips\nscenario pilot: 100-500 candidate static scenes\naccepted scene pilot: 1,000 scenes\nfirst production target: 3,500 accepted scenes\ninitial research scale: 10M+ frames\n```\n\nDo not scale until the current level passes acceptance metrics and visual inspection.\n"}, {"file": "pilot_calibration.md", "label": "Pilot Calibration", "markdown": "# Pilot Calibration\n\n## Purpose\n\nThresholds should not be chosen only from theory. Each scenario family needs empirical calibration\nbecause desks, kitchens, bookshelves, living rooms, and bathrooms have different visual statistics.\n\nThe pilot is a falsification step. It asks whether the current scene grammar, start sampler, motion\nprimitive library, and metric thresholds actually accept good clips and reject bad clips.\n\n## Static Scene Calibration\n\nFor each scenario family:\n\n1. Generate 100-500 candidate static scenes.\n2. Render 10-20 low-resolution probe views per scene.\n3. Compute static scene metrics:\n   - semantic completeness;\n   - support validity;\n   - physical plausibility;\n   - probe foreground ratio;\n   - probe visible object count;\n   - free-space availability;\n   - appearance diversity;\n   - object count and category entropy.\n4. Inspect accepted and rejected examples.\n5. Tune thresholds or revise the scene grammar.\n6. Generate 1,000 accepted scenes only after the pilot passes.\n7. Pass accepted scenes to trajectory generation.\n\n## Trajectory Calibration\n\nFor one scenario family, such as desks:\n\n```text\n100 scenes\n  x 32 starting views\n  x 4 candidate clips\n```\n\nFor each candidate clip, compute:\n\n- foreground ratio;\n- visible object count;\n- dominant object area ratio;\n- semantic entropy;\n- anchor visibility ratio;\n- adjacent visual delta;\n- first-to-last visual delta;\n- adjacent pose delta;\n- first-to-last pose delta;\n- new visible object or surface evidence;\n- action or primitive distribution;\n- rejection reason.\n\nInspect accepted and rejected clips until three qualitative conditions hold:\n\n1. the camera never violates obvious physical constraints;\n2. the visual stream remains smooth and human-like;\n3. the clip contains meaningful objects and meaningful spatial change.\n\n## Pilot Threshold Starting Points\n\n| Requirement | Initial value |\n|---|---:|\n| foreground ratio | 0.4 |\n| minimum visible objects | 2 or 3 |\n| maximum single-object area | 0.7 |\n| anchor visibility ratio | 0.5 |\n| clip length | 32-64 frames |\n| per-frame translation | 1-5 cm |\n| per-frame rotation | 1-3 degrees |\n\nThese are not final. Freeze thresholds only after pilot visual inspection and rejection analysis.\n\n## Calibration Outputs\n\nEach calibration run should produce:\n\n- run report;\n- threshold table by scenario family;\n- distribution plots for each metric;\n- accepted and rejected clip preview dashboard;\n- false accept examples;\n- false reject examples;\n- rejection reason histogram;\n- per-scenario acceptance rate;\n- per-primitive acceptance rate;\n- anchor-category acceptance rate;\n- examples of true accept, true reject, and uncertain cases;\n- decision log.\n\n## Pilot Decision\n\nEach pilot ends with one of these decisions:\n\n| Decision | Meaning |\n|---|---|\n| scale up | Current grammar, policy, and thresholds are good enough for the next scale level. |\n| revise static scene generator | Rejections or false accepts are dominated by bad scene content. |\n| revise trajectory policy | Starts or primitives produce weak or invalid motion. |\n| revise metric thresholds | Visual examples are good but metrics reject them, or bad examples pass. |\n| revise scenario taxonomy | Scenario family definition is too broad, too narrow, or missing important variants. |\n| revise schema | Needed evidence cannot be stored or audited. |\n\nDo not scale on aggregate acceptance rate alone. The visual examples and rejection reasons must\nexplain why the accepted data is useful.\n"}];
    const entryFile = "README.md";
    const nav = document.querySelector("#nav");
    const content = document.querySelector("#content");
    const pathLabel = document.querySelector("#path");
    const byFile = new Map(docs.map((doc) => [doc.file, doc]));
    const byBase = new Map(docs.map((doc) => [doc.file.split("/").pop(), doc]));

    for (const doc of docs) {
      const link = document.createElement("a");
      link.href = `#${encodeURIComponent(doc.file)}`;
      link.textContent = doc.label;
      link.dataset.file = doc.file;
      nav.appendChild(link);
    }

    window.addEventListener("hashchange", () => loadDoc(currentFile()));

    function currentFile() {
      const raw = decodeURIComponent(location.hash.replace(/^#/, "")) || entryFile;
      return byFile.has(raw) ? raw : entryFile;
    }

    function loadDoc(file) {
      const doc = byFile.get(file);
      setActive(file);
      pathLabel.textContent = file;
      if (!doc) {
        content.innerHTML = `<div class="error">Could not load <code>${escapeHtml(file)}</code>.</div>`;
        return;
      }
      content.innerHTML = renderMarkdown(doc.markdown);
      wireInternalLinks();
      window.scrollTo({ top: 0 });
    }

    function setActive(file) {
      for (const link of nav.querySelectorAll("a")) {
        link.classList.toggle("active", link.dataset.file === file);
      }
    }

    function wireInternalLinks() {
      for (const link of content.querySelectorAll("a[href]")) {
        const href = link.getAttribute("href");
        const clean = href.replace(/^<|>$/g, "");
        if (!clean.endsWith(".md") && !clean.includes(".md#")) continue;
        const pathPart = clean.split("#", 1)[0].split("/").pop();
        const target = byBase.get(pathPart);
        if (target) {
          link.addEventListener("click", (event) => {
            event.preventDefault();
            location.hash = encodeURIComponent(target.file);
          });
        }
      }
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let paragraph = [];
      let listType = null;
      let inFence = false;
      let fence = [];
      let table = [];
      let inQuote = false;
      let quote = [];

      function flushParagraph() {
        if (paragraph.length) {
          html.push(`<p>${inline(paragraph.join(" "))}</p>`);
          paragraph = [];
        }
      }
      function flushList() {
        if (listType) {
          html.push(`</${listType}>`);
          listType = null;
        }
      }
      function flushTable() {
        if (table.length) {
          html.push(renderTable(table));
          table = [];
        }
      }
      function flushQuote() {
        if (inQuote) {
          html.push(`<blockquote>${quote.map((line) => `<p>${inline(line)}</p>`).join("")}</blockquote>`);
          inQuote = false;
          quote = [];
        }
      }

      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith("```")) {
          flushParagraph(); flushList(); flushTable(); flushQuote();
          if (inFence) {
            html.push(`<pre><code>${escapeHtml(fence.join("\n"))}</code></pre>`);
            fence = [];
            inFence = false;
          } else {
            inFence = true;
          }
          continue;
        }
        if (inFence) {
          fence.push(line);
          continue;
        }
        if (!trimmed) {
          flushParagraph(); flushList(); flushTable(); flushQuote();
          continue;
        }
        if (trimmed.startsWith("|") && trimmed.endsWith("|")) {
          flushParagraph(); flushList(); flushQuote();
          table.push(trimmed);
          continue;
        }
        flushTable();
        if (trimmed.startsWith(">")) {
          flushParagraph(); flushList();
          inQuote = true;
          quote.push(trimmed.replace(/^>\s?/, ""));
          continue;
        }
        flushQuote();

        const heading = /^(#{1,4})\s+(.+)$/.exec(trimmed);
        if (heading) {
          flushParagraph(); flushList();
          const level = heading[1].length;
          html.push(`<h${level}>${inline(heading[2])}</h${level}>`);
          continue;
        }
        const ordered = /^(\d+)\.\s+(.+)$/.exec(trimmed);
        if (ordered) {
          flushParagraph();
          if (listType !== "ol") {
            flushList();
            html.push("<ol>");
            listType = "ol";
          }
          html.push(`<li>${inline(ordered[2])}</li>`);
          continue;
        }
        const unordered = /^[-*]\s+(.+)$/.exec(trimmed);
        if (unordered) {
          flushParagraph();
          if (listType !== "ul") {
            flushList();
            html.push("<ul>");
            listType = "ul";
          }
          html.push(`<li>${inline(unordered[1])}</li>`);
          continue;
        }
        paragraph.push(trimmed);
      }

      flushParagraph(); flushList(); flushTable(); flushQuote();
      return html.join("\n");
    }

    function renderTable(rows) {
      const filtered = rows.filter((row) => !/^\|\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|$/.test(row));
      if (!filtered.length) return "";
      const cells = filtered.map((row) => row.slice(1, -1).split("|").map((cell) => inline(cell.trim())));
      const head = cells[0].map((cell) => `<th>${cell}</th>`).join("");
      const body = cells.slice(1).map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join("")}</tr>`).join("");
      return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    function inline(text) {
      let safe = escapeHtml(text);
      safe = safe.replace(/`([^`]+)`/g, "<code>$1</code>");
      safe = safe.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      safe = safe.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) => {
        const cleanHref = href.replace(/^&lt;|&gt;$/g, "");
        return `<a href="${escapeAttribute(cleanHref)}">${label}</a>`;
      });
      return safe;
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }
    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("'", "&#39;");
    }

    loadDoc(currentFile());
  </script>
</body>
</html>
